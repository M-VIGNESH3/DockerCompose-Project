name: flower-stack

services:
  flower-web:
    image: vignesh8386/flower-web
    container_name: flower-web  
    ports:
      - "86:3015"
    volumes:
      - data1:/var/lib/data1
    networks:
      - shared
    environment:
      - MONGO_URI=mongodb://mongodb:27017/AFF-Docker
      - PORT=3015
      - SESSION_SECRET=your-secret-key

  flower-db:
    image: mongo
    container_name: d
    build: flowe-web
    networks:
      - shared
    volumes:
      - data1:/var/lib/data1


volumes:
  data1: {}

networks:
  shared: {}
