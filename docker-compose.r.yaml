name: retail-inventory

services:
  app:
    image: vignesh8386/retail:latest
    container_name: re
    # If you build from the repo instead of using the image, replace with:
    # build: .
    ports:
      - "85:3000"
    environment:
      # Match the names your app expects; align with .env.example in the repo
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: retaildb
      DB_USER: retailuser
      DB_PASSWORD: example_user_pwd
      PORT: "3000"
      SESSION_SECRET: your-secret-key
    depends_on:
      - db
    networks:
      - shared2

  db:
    image: mysql:8.0
    container_name: db
    environment:
      MYSQL_ROOT_PASSWORD: example_root_pwd
      MYSQL_DATABASE: retaildb
      MYSQL_USER: retailuser
      MYSQL_PASSWORD: example_user_pwd
    volumes:
      # Persistent database files
      - mysql_data:/var/lib/mysql
      # Auto-run all .sql files on FIRST init
      - ./sql:/docker-entrypoint-initdb.d:ro
      # (Optional) also run a single init file if you use it
      # - ./init-db.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    networks:
      - shared2
    # (Optional) expose MySQL to your host
    # ports:
    #   - "3306:3306"

volumes:
  mysql_data: {}

networks:
  shared2: {}